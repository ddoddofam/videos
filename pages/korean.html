<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글용사 아이야</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --text-muted: #6c757d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
            font-weight: 700;
        }

        .video-count {
            text-align: right;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #e9ecef;
            overflow: hidden;
        }

        .thumbnail-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .video-card:hover .thumbnail-wrapper img {
            transform: scale(1.03);
        }

        .video-details {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        /* 상단 헤더 영역 스타일 (수평선 제거 및 상대 위치 지정) */
        .header-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 버튼은 왼쪽에 고정 */
            margin-bottom: 40px;
            padding-bottom: 15px;
            min-height: 50px; /* 버튼과 제목의 높이 균형을 위해 설정 */
        }

        /* 홈으로 버튼 스타일 */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background-color: #ffffff;
            color: #495057;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #dee2e6;
            transition: all 0.2s ease;
            z-index: 10; /* 제목보다 위에 보이도록 설정 */
        }

        /* 홈으로 버튼 마우스 호버 효과 */
        .home-btn:hover {
            background-color: #ff6b6b;
            color: #ffffff;
            border-color: #ff6b6b;
            transform: translateX(-3px);
        }

        /* ★ 제목 중앙 정렬 스타일 */
        .header-area h1 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            white-space: nowrap; /* 화면이 좁아져도 제목이 줄바꿈되지 않도록 방지 */
        }

        /* 모바일 등 화면이 아주 작아질 때 버튼과 제목이 겹치는 것을 방지 */
        @media (max-width: 576px) {
            .header-area {
                flex-direction: column;
                gap: 15px;
            }
            .header-area h1 {
                position: static;
                transform: none;
                left: auto;
            }
        }
        /* 검색창 영역 스타일 */
        .search-area {
            max-width: 500px;
            margin: 0 auto 30px auto; /* 가운데 정렬 및 아래 여백 */
            padding: 0 10px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #dee2e6;
            border-radius: 30px; /* 둥글둥글한 디자인 */
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease;
        }

        /* 검색창에 마우스를 올리거나 클릭했을 때 */
        .search-input:focus {
            border-color: #ff6b6b; /* 포인트 색상으로 변경 */
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-area">
            <a href="../index.html" class="home-btn">
                🏠 홈으로
            </a>
            <h1>한글용사 아이야</h1> </div>
        <div class="search-area">
            <input type="text" id="search-box" class="search-input" placeholder="🔍 보고 싶은 영상의 제목을 검색해 보세요!">
        </div>
        <div class="video-count" id="total-count">총 0개의 영상</div>
        
        <div class="video-grid" id="video-container"></div>
    </div>

    <!-- 1. 데이터 파일 먼저 로드 -->
    <script src="videos.js"></script>
    
    <!-- 2. 데이터를 읽어서 화면에 카드를 그리는 스크립트 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("video-container");
            const countDisplay = document.getElementById("total-count");
            const searchBox = document.getElementById("search-box"); // 검색창 가져오기
            
            // 유튜브 비디오 ID 추출 함수
            function getYoutubeId(url) {
                if (!url) return null;
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            }

            // 화면에 영상 카드들을 그리는 핵심 함수 (검색할 때마다 다시 실행됨)
            function displayVideos(videosToShow) {
                container.innerHTML = ""; // 기존 카드를 싹 지우고 시작
                countDisplay.innerText = `총 ${videosToShow.length}개의 영상`;

                videosToShow.forEach(video => {
                    const card = document.createElement("a");
                    card.href = video.link;
                    card.target = "_blank";
                    card.className = "video-card";

                    const videoId = getYoutubeId(video.link);
                    let finalThumbnail = video.thumbnail || (videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : 'https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=600');

                    card.innerHTML = `
                        <div class="thumbnail-wrapper">
                            <img src="${finalThumbnail}" alt="${video.title}" loading="lazy">
                        </div>
                        <div class="video-details">
                            <h2 class="video-title">${video.title}</h2>
                            <p class="video-desc">${video.desc || ''}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            // 처음 들어왔을 때는 전체 영상을 보여줌
            displayVideos(koreanVideos);

            // ★ 검색창에 글자를 입력할 때마다 실행되는 이벤트
            searchBox.addEventListener("input", function(e) {
                const keyword = e.target.value.toLowerCase().trim(); // 입력한 글자 (소문자 공백 제거 변환)
                
                // 제목에 검색어가 포함된 영상들만 쏙 골라내기
                const filteredVideos = koreanVideos.filter(video => {
                    return video.title.toLowerCase().includes(keyword);
                });
                
                // 필터링된 결과만 화면에 새로 그리기
                displayVideos(filteredVideos);
            });
        });
    </script>
</body>
</html>
